security:
    role_hierarchy:
        ROLE_ADMIN: [ROLE_ADMIN]

    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'bcrypt'

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        users_in_memory:
            memory:
                users:
                    admin: { password: "%env(ADMINPASS)%", roles: [ 'ROLE_ADMIN' ] }

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|css|images|js|assets|build)/
            security: false

        test:
            pattern:  ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            pattern: ^/
            lazy: true
            provider: users_in_memory

            form_login:
                login_path: login
                check_path: login_check
                use_referer: true

            logout: ~

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/(.*)\.xml, roles: PUBLIC_ACCESS}
        - { path: ^/login, roles: PUBLIC_ACCESS}
        - { path: ^/feed/test, roles: PUBLIC_ACCESS}
        - { path: ^/(feed)|(logs)|(item)|(dashboard)|(login_check), roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'plaintext'
